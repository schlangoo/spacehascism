<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Hascism</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🛸</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <header>
            <!-- Header-Bild ohne Container-Styling -->
            <img src="header.png" alt="Space Hascism Header" class="header-image" width="1200" height="400" loading="eager" decoding="async" fetchpriority="high">
            
            <div class="greeting-wrapper">
                <p class="greeting">DAS multiplanetare Sprachrohr des Dezentralrats der Haschisten.</p>
                <a href="https://youtube.com/@apuhpropaganda" target="_blank" rel="noopener noreferrer" class="youtube-btn" title="YouTube Kanal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </a>
            </div>
        </header>
        
        <div class="feed-selector">
            <button onclick="loadOwnTexts(this)" id="own-texts-btn"><span class="red-star">★</span> HASCHISTEN</button>
            <button onclick="loadFeed('coulthart', this)">Ross Coulthart</button>
            <button onclick="loadFeed('knapp', this)">George Knapp</button>
            <button onclick="loadFeed('elizondo', this)">Lue Elizondo</button>
            <button onclick="loadFeed('nolan', this)">Garry Nolan</button>
            <button onclick="loadFeed('loeb', this)">Avi Loeb</button>
        </div>
        
        <main id="feed-content">
            <!-- Hier werden die Feeds oder eigenen Texte geladen -->
        </main>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
